name: Build PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Docusaurus
        uses: actions/cache@v4
        with:
          path: .docusaurus
          key: docusaurus-${{ github.ref }}-${{ hashFiles('docs/**', 'blog/**', 'src/**', 'docusaurus.config.*') }}
          restore-keys: |
            docusaurus-${{ github.ref }}-
            docusaurus-

      - name: Build website
        run: npm run build
        env:
          EDIT_BRANCH: ${{ github.event.pull_request.head.ref }}
          EDIT_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          DOCUSAURUS_URL: https://pr-${{ github.event.pull_request.number }}.meshrheinland.pages.dev

      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > build/.PR_NUMBER

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-${{ github.run_id }}
          path: build/
          retention-days: 1
          include-hidden-files: true
